name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Check imports
        run: python -c "from main import app; print('FastAPI app imports OK')"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build deployment zip
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "__pycache__/*" \
            -x "*.ipynb_checkpoints*" \
            -x "mlruns/*" \
            -x "deploy.zip"

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --name credit-risk-scorer \
            --resource-group credit-risk-rg \
            --src-path deploy.zip \
            --type zip
